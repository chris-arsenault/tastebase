name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref == 'refs/heads/main' && 'tastebase-deploy' || format('tastebase-{0}', github.ref) }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@v4

      # Rust
      - name: Rust version key
        id: rust
        run: echo "cachekey=$(rustc --version | sha256sum | head -c12)" >> "$GITHUB_OUTPUT"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: rust-${{ steps.rust.outputs.cachekey }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-${{ steps.rust.outputs.cachekey }}-

      - name: Lint clippy
        working-directory: backend
        run: cargo clippy -- -D warnings

      - name: Lint rustfmt
        working-directory: backend
        run: cargo fmt -- --check

      # Frontend
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.29.3 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm exec eslint .

      - name: Lint typecheck frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      # Terraform
      - name: Lint terraform
        run: terraform fmt -check -recursive infrastructure/terraform/

      # SonarQube
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - uses: chris-arsenault/platform/.github/actions/sonar-scan@main
        continue-on-error: true
        with:
          project-key: tastebase
          sources: backend,frontend/src,infrastructure/terraform
          exclusions: "**/target/**,**/node_modules/**,**/dist/**,**/.terraform/**"

      # Deploy (main only)
      - name: Install cargo-lambda
        if: github.ref == 'refs/heads/main'
        run: pip3 install cargo-lambda

      - uses: aws-actions/configure-aws-credentials@v6
        if: github.ref == 'refs/heads/main'
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      - name: Build Lambdas
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: cargo lambda build --release

      - name: Build frontend
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        run: pnpm run build

      - uses: chris-arsenault/platform/.github/actions/run-migrations@main
        if: github.ref == 'refs/heads/main'
        with:
          project: tastebase
          migrations-dir: db/migrations

      - name: Terraform deploy
        if: github.ref == 'refs/heads/main'
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: |
          terraform -chdir=infrastructure/terraform init -reconfigure \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true"
          terraform -chdir=infrastructure/terraform apply -auto-approve

  report:
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
