name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tastebase-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4

      # Rust
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: rust-lint-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-lint-
      - name: Clippy
        working-directory: backend
        run: cargo clippy -- -D warnings
      - name: Rustfmt
        working-directory: backend
        run: cargo fmt -- --check

      # Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.29.3 --activate
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Lint frontend
        working-directory: frontend
        run: pnpm exec eslint .
      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      # Terraform
      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [lint]
    runs-on: ubuntu-latest
    concurrency:
      group: tastebase-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.29.3 --activate
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: rust-deploy-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-deploy-
      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      # AWS credentials
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1

      # Migrations
      - uses: chris-arsenault/platform/.github/actions/run-migrations@main
        with:
          project: tastebase
          migrations-dir: db/migrations

      # Deploy
      - name: Deploy
        env:
          STATE_BUCKET: ${{ secrets.STATE_BUCKET }}
        run: bash scripts/deploy.sh

  report:
    if: always()
    needs: [lint, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: us-east-1
      - uses: chris-arsenault/platform/.github/actions/report-build@main
        with:
          status: ${{ (needs.deploy.result == 'success' && 'success') || (needs.lint.result == 'failure' && 'failure') || needs.deploy.result }}
          lint-passed: ${{ needs.lint.result == 'success' }}
